<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPV Scorecard</title>
<style>
/* Styles (same as your previous version, condensed) */
body{font-family:sans-serif;background:#e8e6df;margin:0;padding:32px 16px 64px;min-height:100vh}
#root{max-width:640px;margin:0 auto;background:#F1EFE8;border-radius:12px;padding:36px 28px 44px;color:#111}
.card{background:#fff;border-radius:12px;border:0.5px solid #D3D1C7;padding:24px;margin-bottom:4px}
/* Progress Bar */
.prog-bar{height:2px;background:#D3D1C7;border-radius:2px;margin-bottom:32px}
.prog-fill{height:2px;background:#111;border-radius:2px;transition:width .4s ease;width:0%}
.btn{padding:10px 22px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;border:1.5px solid #111;transition:all .15s}
.btn-p{background:#111;color:#fff}
.btn-p:hover{opacity:.85}
.hidden{display:none!important}
.options{display:flex;gap:8px;margin-bottom:20px}
.opt{flex:1;border:1.5px solid #D3D1C7;border-radius:8px;padding:10px;text-align:center;cursor:pointer;background:#fff;transition:all .15s}
.opt:hover{border-color:#888780;background:#F1EFE8}
.opt.sel{border-color:#111;background:#111;color:#fff}
.field{margin-bottom:13px}
.field label{font-size:12px;font-weight:500;color:#444441;display:block;margin-bottom:5px}
.field input{width:100%;padding:10px 14px;border:1.5px solid #D3D1C7;border-radius:8px;font-size:13.5px;color:#111;background:#fff;outline:none;transition:border .15s;font-family:inherit}
.field input:focus{border-color:#111}
</style>
</head>
<body>
<div id="root">
  <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
  <div id="s-intro"></div>
  <div id="s-questions" class="hidden"></div>
  <div id="s-email" class="hidden"></div>
  <div id="s-results" class="hidden"></div>
</div>

<script>
// Formspree endpoint
var FORM_ENDPOINT = "https://formspree.io/f/xykbvzea";

// Sections and questions
var sections=[
  {label:"01 — Launch Readiness",questions:["If a compelling allocation landed today, we could have materials in front of the right LPs within 48 hours.","Our vehicle templates are standardized enough that formation does not mean starting from scratch each time.","Our fundraising window has never been compressed because we were late getting organized internally."]},
  {label:"02 — Investor Data & Identity",questions:["If an LP called right now asking about their total exposure across all our vehicles, we could answer accurately without putting them on hold.","KYC is collected the same way, every time, regardless of who is running the process.","There is one place where LP identity data lives — not inboxes, not spreadsheets, not in one person's head."]},
  {label:"03 — Capital & Position Tracking",questions:["At any point in a raise, we know exactly where we stand: commitments received, wires cleared, and what is still outstanding.","A position error has never made it past our internal process to an LP confirmation.","If our operations lead left tomorrow, someone else could pick up position tracking without losing data or context."]},
  {label:"04 — LP Communications",questions:["When we launch a new SPV, we do not email every LP on our list — we select who we contact based on what we know about them.","Our LPs rarely ask us for status updates because we have already sent them.","Every stage of a raise has a defined communication — we are not deciding in the moment who gets what and when."]},
  {label:"05 — Operational Resilience",questions:["Adding one more SPV to our calendar this year would not meaningfully change anyone's workload.","If our key operations person was out for two weeks, the program would keep running without a scramble.","Year-end has never resulted in confused LPs or an internal sprint to locate documents."]},
  {label:"06 — Economics & Sustainability",questions:["We have never absorbed operational costs internally because we underpriced a vehicle.","As our SPV volume has grown, we have revisited our fee structures to make sure the economics still hold."]}
];

var answers={},cur=0;

// Helpers
function el(id){return document.getElementById(id);}
function show(id){["intro","questions","email","results"].forEach(s=>el("s-"+s).classList.toggle("hidden",s!==id));}
function setProgress(p){el("prog").style.width=p+"%";}
function secDone(){return sections[cur].questions.every((_,qi)=>answers[cur+"-"+qi]!==undefined);}
function updateProgress(){var total=sections.reduce((a,s)=>a+s.questions.length,0); var done=Object.keys(answers).length; setProgress(Math.max(5,Math.round((done/total)*85)));}

// Render Intro
function renderIntro(){
  var wrap=el("s-intro"); wrap.innerHTML="";
  var card=document.createElement("div"); card.className="card";
  card.innerHTML="<h2>SPV Scorecard</h2><p>Rate each statement honestly. About 5 minutes.</p>";
  var btn=document.createElement("button"); btn.className="btn btn-p"; btn.textContent="Start →";
  btn.onclick=function(){cur=0; renderSection(); show("questions"); setProgress(5);};
  card.appendChild(btn); wrap.appendChild(card);
}

// Render Section
function renderSection(){
  var wrap=el("s-questions"); wrap.innerHTML="";
  var s=sections[cur];
  var card=document.createElement("div"); card.className="card";
  var title=document.createElement("h3"); title.textContent=s.label; card.appendChild(title);
  s.questions.forEach((qtext,q)=>{
    var qid=cur+"-"+q;
    var qwrap=document.createElement("div"); qwrap.style.marginBottom="12px";
    var qel=document.createElement("p"); qel.textContent=qtext; qwrap.appendChild(qel);
    var opts=document.createElement("div"); opts.className="options";
    ["Not in place","Partially in place","Fully in place"].forEach((lbl,i)=>{
      var o=document.createElement("div"); o.className="opt"; o.innerHTML=i+1+"<br>"+lbl;
      if(answers[qid]==i+1)o.classList.add("sel");
      o.onclick=function(){answers[qid]=i+1; renderSection(); updateProgress();};
      opts.appendChild(o);
    });
    qwrap.appendChild(opts); card.appendChild(qwrap);
  });
  var btnNext=document.createElement("button"); btnNext.className="btn btn-p"; btnNext.textContent=cur<sections.length-1?"Next →":"Submit →";
  btnNext.onclick=function(){
    if(!secDone()){alert("Please answer all questions in this section."); return;}
    if(cur<sections.length-1){cur++; renderSection();}else{renderEmail(); show("email"); setProgress(90);}
  };
  card.appendChild(btnNext); wrap.appendChild(card); scrollTo(0,0);
}

// Render Email
function renderEmail(){
  var wrap=el("s-email"); wrap.innerHTML="";
  var card=document.createElement("div"); card.className="card";
  card.innerHTML="<h3>Enter your info</h3>";
  var f=document.createElement("form"); f.method="POST"; f.action=FORM_ENDPOINT;
  f.innerHTML='<div class="field"><label for="name">Name</label><input type="text" name="name" required></div>'+
                '<div class="field"><label for="email">Email</label><input type="email" name="email" required></div>'+
                '<button class="btn btn-p" type="submit">Get Results →</button>';
  card.appendChild(f); wrap.appendChild(card);
}

// Init
renderIntro();
</script>
</body>
</html>
