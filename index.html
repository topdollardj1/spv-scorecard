<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SPV Scorecard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:-apple-system,BlinkMacSystemFont,"Inter","Helvetica Neue",sans-serif;
background:#e8e6df;
padding:32px 16px;
}

#root{
max-width:640px;
margin:auto;
background:#F1EFE8;
border-radius:12px;
padding:32px 24px;
}

.bar-wrap{height:2px;background:#D3D1C7;margin-bottom:28px}
.bar{height:2px;background:#111;width:0%;transition:.4s}

.card{
background:#fff;
border-radius:12px;
padding:22px;
border:1px solid #D3D1C7;
margin-bottom:12px;
}

.label{
font-size:11px;
letter-spacing:.1em;
color:#888;
margin-bottom:8px;
text-transform:uppercase;
}

.title{
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.body{
font-size:13.5px;
color:#444;
line-height:1.6;
}

.q{margin-bottom:18px;font-size:13.5px}

.opts{display:flex;gap:8px;margin-top:8px}
.opt{
flex:1;
border:1px solid #D3D1C7;
border-radius:8px;
padding:10px;
text-align:center;
cursor:pointer;
transition:.15s;
font-size:12px;
}
.opt:hover{background:#F1EFE8}
.opt.sel{background:#111;color:#fff;border-color:#111}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:18px;
}

.btn{
padding:10px 18px;
border-radius:8px;
border:1px solid #111;
font-size:13px;
cursor:pointer;
}

.primary{background:#111;color:#fff}
.primary:disabled{opacity:.3;cursor:not-allowed}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #D3D1C7;
margin-bottom:10px;
}

.hidden{display:none}
</style>
</head>

<body>
<div id="root">
<div class="bar-wrap"><div class="bar" id="bar"></div></div>

<div id="intro"></div>
<div id="questions" class="hidden"></div>
<div id="email" class="hidden"></div>
<div id="results" class="hidden"></div>
</div>

<script>
const APP_SCRIPT_URL="https://script.google.com/macros/s/AKfycby-5A4AqR5iCKV9lAxWEudNqUr-hiiXYnxPmI8fFcxbcKAZAckqWFzMQk1ul_3zYzGNTA/exec";

const sections=[
{label:"01 — Launch Readiness",q:[
"If a compelling allocation landed today, we could have materials in front of LPs within 48 hours.",
"Our vehicle templates are standardized enough that formation doesn’t mean starting from scratch.",
"Our fundraising has never been delayed by internal disorganization."
]},
{label:"02 — Investor Data & Identity",q:[
"We can instantly report LP exposure across all vehicles.",
"KYC is collected consistently every time.",
"LP data exists in one source of truth."
]},
{label:"03 — Capital & Tracking",q:[
"We always know commitments and wires in real time.",
"No position errors reach LPs.",
"Tracking can be handed over without friction."
]},
{label:"04 — LP Communication",q:[
"We target outreach based on LP profile.",
"LPs rarely ask for updates.",
"Each stage has defined communication."
]},
{label:"05 — Operations",q:[
"Adding SPVs doesn't increase workload.",
"Operations are not dependent on one person.",
"Year-end runs smoothly."
]},
{label:"06 — Economics",q:[
"No SPVs are underpriced.",
"Fees are regularly reviewed."
]}
];

let answers={},cur=0;

function show(id){
["intro","questions","email","results"].forEach(s=>{
document.getElementById(s).classList.add("hidden");
});
document.getElementById(id).classList.remove("hidden");
}

function progress(){
let total=sections.reduce((a,s)=>a+s.q.length,0);
let done=Object.keys(answers).length;
document.getElementById("bar").style.width=(done/total*100)+"%";
}

// INTRO
function renderIntro(){
intro.innerHTML=`
<div class="card">
<div class="label">Assessment</div>
<div class="title">Rate your SPV infrastructure</div>
<div class="body">17-question scorecard (~5 minutes)</div>
</div>
<div class="nav">
<div></div>
<button class="btn primary" onclick="start()">Start →</button>
</div>`;
show("intro");
}

function start(){
cur=0;
renderSection();
show("questions");
progress();
}

// QUESTIONS
function renderSection(){
let s=sections[cur];

let html=`<div class="card">
<div class="label">${s.label}</div>`;

s.q.forEach((q,i)=>{
let key=cur+"-"+i;
html+=`
<div class="q">${q}
<div class="opts">
<div class="opt ${answers[key]==1?"sel":""}" onclick="select('${key}',1,this)">1</div>
<div class="opt ${answers[key]==2?"sel":""}" onclick="select('${key}',2,this)">2</div>
<div class="opt ${answers[key]==3?"sel":""}" onclick="select('${key}',3,this)">3</div>
</div>
</div>`;
});

html+=`</div>
<div class="nav">
<button class="btn" onclick="back()" ${cur==0?"style='visibility:hidden'":""}>Back</button>
<button class="btn primary" id="next" onclick="next()" ${!complete()?"disabled":""}>${cur==5?"Continue →":"Next →"}</button>
</div>`;

questions.innerHTML=html;
show("questions");
}

function select(key,val,el){
answers[key]=val;
[...el.parentNode.children].forEach(x=>x.classList.remove("sel"));
el.classList.add("sel");
document.getElementById("next").disabled=!complete();
progress();
}

function complete(){
return sections[cur].q.every((_,i)=>answers[cur+"-"+i]);
}

function next(){
if(cur<sections.length-1){cur++;renderSection();}
else renderEmail();
}

function back(){cur--;renderSection();}

// EMAIL
function renderEmail(){
email.innerHTML=`
<div class="card">
<div class="title">Your results are ready</div>
<input id="name" placeholder="Full Name">
<input id="emailField" placeholder="Work Email">
<input id="firm" placeholder="Firm">
</div>
<div class="nav">
<button class="btn" onclick="back()">Back</button>
<button class="btn primary" onclick="submit()">See my results →</button>
</div>`;
show("email");
}

function submit(){
let name=document.getElementById("name").value;
let email=document.getElementById("emailField").value;
let firm=document.getElementById("firm").value;

if(!name||!email.includes("@")||!firm){
alert("Please complete all fields");
return;
}

let score=Object.values(answers).reduce((a,b)=>a+b,0);

// SEND DATA
fetch(APP_SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({name,email,firm,score,answers})
});

renderResults(score);
}

// RESULTS
function renderResults(score){
let stage,desc;

if(score<=25){
stage="Stage 1 — Opportunistic";
desc="Your infrastructure is fragile and highly manual.";
}
else if(score<=33){
stage="Stage 2 — Repeatable";
desc="Processes exist but rely on individuals.";
}
else if(score<=41){
stage="Stage 3 — Programmatic";
desc="Strong systems, but data fragmentation risk.";
}
else{
stage="Stage 4 — Compounding";
desc="Scalable, high-performing SPV program.";
}

results.innerHTML=`
<div class="card">
<div class="title">${score}/51</div>
<div class="body"><strong>${stage}</strong></div>
<div class="body" style="margin-top:10px">${desc}</div>
</div>`;
show("results");
}

// INIT
renderIntro();
</script>
</body>
</html>
