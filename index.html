<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPV Scorecard</title>
<style>
body{margin:0;font-family:sans-serif;background:#e8e6df;}
#root{max-width:640px;margin:0 auto;padding:32px;}
.card{background:#fff;padding:24px;border-radius:12px;margin-bottom:16px;}
.intro-title{font-size:22px;font-weight:600;margin-bottom:12px;}
.intro-body{font-size:14px;margin-bottom:20px;}
.scale-row{display:flex;justify-content:space-between;margin-bottom:20px;}
.scale-item{text-align:center;font-size:12px;}
.scale-num{display:block;margin-bottom:4px;width:24px;height:24px;line-height:24px;border-radius:50%;border:1px solid #888;}
.nav-info{font-size:12px;color:#555;margin-bottom:10px;}
.question{margin-bottom:16px;}
.opt{flex:1;margin:0 4px;padding:10px;border:1px solid #888;border-radius:8px;text-align:center;cursor:pointer;user-select:none;}
.opt.selected{background:#111;color:#fff;border-color:#111;}
.options{display:flex;}
.btn{padding:10px 20px;border:none;border-radius:8px;background:#111;color:#fff;cursor:pointer;}
.btn:disabled{opacity:0.3;cursor:not-allowed;}
.results{background:#fff;padding:24px;border-radius:12px;}
.score-big{font-size:48px;font-weight:600;text-align:center;margin-bottom:4px;}
.score-label{text-align:center;font-size:14px;color:#555;margin-bottom:16px;}
.res-title{font-weight:600;font-size:16px;margin-bottom:6px;}
.res-body{font-size:14px;margin-bottom:16px;}
.pri-label{font-size:11px;font-weight:600;color:#888;margin-bottom:8px;}
.pri{display:flex;align-items:flex-start;margin-bottom:8px;}
.dot{width:6px;height:6px;background:#111;border-radius:50%;margin-right:8px;margin-top:6px;}
</style>
</head>
<body>
<div id="root">
  <div id="intro"></div>
  <div id="questions" style="display:none;"></div>
  <div id="results" style="display:none;"></div>
</div>

<script>
// Sections + questions
const sections = [
  { label:"Launch Readiness", questions:["If a compelling allocation landed today, we could have materials in front of LPs in 48h.","Vehicle templates are standardized.","Fundraising window never compressed."]},
  { label:"Investor Data & Identity", questions:["LP total exposure can be answered immediately.","KYC is consistent.","All LP data in one place."]},
  { label:"Capital & Position Tracking", questions:["Real-time tracking of commitments.","No position errors reach LP.","Backup process exists."]},
  { label:"LP Communications", questions:["Segmented communications per LP.","Defined cadence for each stage.","Protocol for all stages documented."]},
  { label:"Operational Resilience", questions:["Adding SPV does not overload team.","Key ops absence manageable.","Year-end runs smoothly."]},
  { label:"Economics & Sustainability", questions:["Operational costs covered.","Fees revisited as volume grows."]}
];

const stages = [
  {min:0,max:16,name:"Stage 1: Opportunistic",title:"You're closing deals. The infrastructure is holding on.",body:"Most GPs at this stage are doing more than the process can comfortably support. Things get done, but through effort and coordination rather than system.",fallback:"Focus on locking in what works before scaling."},
  {min:17,max:33,name:"Stage 2: Repeatable",title:"The process exists. It lives in one person's head.",body:"You have workflows, templates. Fragility is in dependencies.",fallback:"Address gaps and you are closer to Stage 3."},
  {min:34,max:41,name:"Stage 3: Programmatic",title:"Running a program. Data not keeping pace.",body:"SPV program works but data fragmentation shows up.",fallback:"Shift from building to protecting."},
  {min:42,max:51,name:"Stage 4: Compounding",title:"The program is working. Keep discipline.",body:"LP base generates momentum. Team runs workflow. Risks are subtle drift.",fallback:"Maintain operational discipline."}
];

let currentSection = 0;
let answers = {};

// Render intro
function renderIntro(){
  const intro = document.getElementById("intro");
  intro.innerHTML = `<div class="card">
    <div class="intro-title">Rate your SPV infrastructure</div>
    <div class="intro-body">Benchmark your current operations against the four-stage SPV maturity model. Rate honestly — ~5 minutes.</div>
    <div class="scale-row">
      <div class="scale-item"><span class="scale-num">1</span>Not in place</div>
      <div class="scale-item"><span class="scale-num">2</span>Partially</div>
      <div class="scale-item"><span class="scale-num">3</span>Fully in place</div>
    </div>
    <div class="nav-info">Section 1 of ${sections.length}</div>
    <button class="btn" onclick="startQuiz()">Start →</button>
  </div>`;
}

function startQuiz(){
  document.getElementById("intro").style.display="none";
  document.getElementById("questions").style.display="block";
  renderSection();
}

function renderSection(){
  const sec = sections[currentSection];
  const container = document.getElementById("questions");
  container.innerHTML = `<div class="nav-info">Section ${currentSection+1} of ${sections.length} — ${sec.label}</div>`;
  sec.questions.forEach((q,qi)=>{
    const qDiv = document.createElement("div");
    qDiv.className="question";
    qDiv.innerHTML=`<div>${q}</div>`;
    const opts = document.createElement("div"); opts.className="options";
    [1,2,3].forEach(n=>{
      const btn = document.createElement("div");
      btn.className="opt";
      btn.textContent=n;
      btn.onclick=()=>{answers[`${currentSection}-${qi}`]=n; updateSelection(opts,n); checkNext();};
      opts.appendChild(btn);
    });
    qDiv.appendChild(opts);
    container.appendChild(qDiv);
  });
  const nextBtn = document.createElement("button");
  nextBtn.className="btn"; nextBtn.id="next-btn"; nextBtn.disabled=true;
  nextBtn.textContent=(currentSection==sections.length-1)?"Finish":"Next →";
  nextBtn.onclick=nextSection;
  container.appendChild(nextBtn);
}

function updateSelection(optsDiv,n){
  Array.from(optsDiv.children).forEach(c=>c.classList.toggle("selected",c.textContent==n));
}

function checkNext(){
  const sec = sections[currentSection];
  const allAnswered = sec.questions.every((_,i)=>answers[`${currentSection}-${i}`]);
  document.getElementById("next-btn").disabled = !allAnswered;
}

function nextSection(){
  currentSection++;
  if(currentSection>=sections.length){renderResults(); return;}
  renderSection();
}

// Render results
function renderResults(){
  document.getElementById("questions").style.display="none";
  document.getElementById("results").style.display="block";
  const total = Object.values(answers).reduce((a,b)=>a+b,0);
  const stage = stages.find(s=>total>=s.min && total<=s.max);
  const res = document.getElementById("results");
  res.innerHTML = `<div class="results">
    <div class="score-big">${total}/51</div>
    <div class="score-label">Your total score</div>
    <div class="res-title">${stage.name}</div>
    <div class="res-body">${stage.title}<br>${stage.body}</div>
    <div class="pri-label">Where to focus next</div>
    <div class="pri"><div class="dot"></div><div class="pri-text">${stage.fallback}</div></div>
  </div>`;
}

renderIntro();
</script>
</body>
</html>
