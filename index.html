<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPV Maturity Scorecard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Inter","Helvetica Neue",sans-serif;}
body{background:#e8e6df;padding:32px 16px;min-height:100vh;}
#root{max-width:640px;margin:0 auto;background:#F1EFE8;border-radius:12px;padding:36px 28px 44px;color:#111;}
.prog-bar{height:4px;background:#D3D1C7;border-radius:2px;margin-bottom:32px;overflow:hidden;}
.prog-fill{height:100%;background:#111;width:0%;transition:width 0.4s ease;}
.card{background:#fff;border-radius:12px;border:0.5px solid #D3D1C7;padding:24px;margin-bottom:24px;}
.intro-label{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#888780;margin-bottom:10px;}
.intro-title{font-size:21px;font-weight:600;line-height:1.25;color:#111;margin-bottom:10px;}
.intro-body{font-size:13.5px;line-height:1.7;color:#444441;margin-bottom:20px;}
.question{margin-bottom:24px;}
.q-text{font-size:13.5px;color:#111;margin-bottom:8px;}
.opts{display:flex;gap:8px;margin-top:8px;}
.opt{flex:1;border:1.5px solid #D3D1C7;border-radius:8px;padding:10px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;font-size:13px;}
.opt:hover{border-color:#888780;background:#F1EFE8;}
.opt.sel{border-color:#111;background:#111;color:#fff;}
.opt div{font-size:12px;}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;}
.nav-info{font-size:12px;color:#888780;}
.btn{padding:10px 22px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;border:1.5px solid #111;transition:all .15s;}
.btn.primary{background:#111;color:#fff;}
.btn.primary:hover{opacity:.85;}
.btn.secondary{background:transparent;color:#111;}
.btn.secondary:hover{background:#D3D1C7;}
.hidden{display:none!important;}
.field{margin-bottom:13px;}
.field label{font-size:12px;font-weight:500;color:#444441;display:block;margin-bottom:5px;}
.field input{width:100%;padding:10px 14px;border:1.5px solid #D3D1C7;border-radius:8px;font-size:13.5px;color:#111;background:#fff;outline:none;transition:border .15s;}
.field input:focus{border-color:#111;}
.field input.err{border-color:#E24B4A;}
.privacy{font-size:11px;color:#888780;margin-top:10px;line-height:1.5;}
.score-hero{text-align:center;padding:24px 0 18px;border-bottom:0.5px solid #D3D1C7;margin-bottom:20px;}
.score-big{font-size:50px;font-weight:600;line-height:1;color:#111;}
.score-denom{font-size:17px;color:#888780;font-weight:400;}
.score-lbl{font-size:12px;color:#888780;margin-top:5px;}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;background:#111;color:#fff;font-size:11px;font-weight:500;margin-top:12px;letter-spacing:.04em;}
.track{display:flex;gap:6px;margin-top:16px;justify-content:center;}
.pip{width:38px;height:4px;border-radius:2px;background:#D3D1C7;}
.pip.on{background:#111;}
.weak-banner{font-size:12.5px;color:#444441;background:#F1EFE8;border-radius:6px;padding:10px 14px;margin-bottom:18px;line-height:1.5;}
.weak-banner strong{color:#111;font-weight:600;}
.res-title{font-size:17px;font-weight:600;margin-bottom:8px;}
.res-body{font-size:13.5px;line-height:1.7;color:#444441;margin-bottom:16px;}
.pri-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#888780;margin-bottom:10px;}
.pri{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start;}
.dot{width:5px;height:5px;border-radius:50%;background:#111;flex-shrink:0;margin-top:7px;}
.pri-text{font-size:13px;line-height:1.55;color:#111;}
.fallback{font-size:13.5px;line-height:1.7;color:#444441;font-style:italic;}
.cta-block{background:#111;color:#fff;border-radius:12px;padding:22px 26px;margin-top:12px;}
.cta-title{font-size:16px;font-weight:600;margin-bottom:7px;}
.cta-body{font-size:13px;line-height:1.65;opacity:.72;margin-bottom:16px;}
.btn-w{background:#fff;color:#111;border:none;padding:10px 22px;border-radius:8px;font-size:13.5px;font-weight:500;cursor:pointer;}
.btn-w:hover{opacity:.85;}
</style>
</head>
<body>
<div id="root">
  <div class="prog-bar"><div class="prog-fill" id="prog"></div></div>
  <div id="intro"></div>
  <div id="questions" class="hidden"></div>
  <div id="email" class="hidden"></div>
  <div id="results" class="hidden"></div>
</div>

<script>
const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzA7H6i1lF5LY9Oga6qfYVfuyRXf6egPUt2aSl6SUD4kW0sfv1XOdgOIUegpLZa_H8_xg/exec";

const sections = [
  { label:"01 — Launch Readiness", questions:["If a compelling allocation landed today, we could have materials in front of the right LPs within 48 hours.","Our vehicle templates are standardized enough that formation does not mean starting from scratch each time.","Our fundraising window has never been compressed because we were late getting organized internally."]},
  { label:"02 — Investor Data & Identity", questions:["If an LP called right now asking about their total exposure across all our vehicles, we could answer accurately without putting them on hold.","KYC is collected the same way, every time, regardless of who is running the process.","There is one place where LP identity data lives — not inboxes, not spreadsheets, not in one person's head."]},
  { label:"03 — Capital & Position Tracking", questions:["At any point in a raise, we know exactly where we stand: commitments received, wires cleared, and what is still outstanding.","A position error has never made it past our internal process to an LP confirmation.","If our operations lead left tomorrow, someone else could pick up position tracking without losing data or context."]},
  { label:"04 — LP Communications", questions:["When we launch a new SPV, we do not email every LP on our list — we select who we contact based on what we know about them.","Our LPs rarely ask us for status updates because we have already sent them.","Every stage of a raise has a defined communication — we are not deciding in the moment who gets what and when."]},
  { label:"05 — Operational Resilience", questions:["Adding one more SPV to our calendar this year would not meaningfully change anyone's workload.","If our key operations person was out for two weeks, the program would keep running without a scramble.","Year-end has never resulted in confused LPs or an internal sprint to locate documents."]},
  { label:"06 — Economics & Sustainability", questions:["We have never absorbed operational costs internally because we underpriced a vehicle.","As our SPV volume has grown, we have revisited our fee structures to make sure the economics still hold."]}
];

let answers = {}, cur=0;

function el(id){return document.getElementById(id);}
function show(id){["intro","questions","email","results"].forEach(s=>el(s).classList.toggle("hidden",s!==id));}
function setProgress(p){el("prog").style.width=p+"%";}
function updateProgress(){const total=sections.reduce((a,s)=>a+s.questions.length,0);const done=Object.keys(answers).length;setProgress(Math.round(done/total*100));}

function renderIntro(){
  const wrap=el("intro"); wrap.innerHTML="";
  const card=document.createElement("div"); card.className="card";
  card.innerHTML="<div class='intro-label'>Assessment</div><div class='intro-title'>Rate your SPV infrastructure</div><div class='intro-body'>This scorecard benchmarks your current operations against the four-stage SPV maturity model. Rate each statement honestly — it takes about five minutes.<br>1 — Not in place<br>2 — Partially in place<br>3 — Fully in place<br><br>6 sections · 17 questions</div>";
  const btn=document.createElement("button"); btn.className="btn primary"; btn.innerHTML="Start →"; btn.onclick=()=>{cur=0;renderSection();show("questions");setProgress(0);};
  card.appendChild(btn); wrap.appendChild(card);
}

function renderSection(){
  const wrap=el("questions"); wrap.innerHTML="";
  const s=sections[cur];
  s.questions.forEach((q,qi)=>{
    const key=cur+"-"+qi;
    const qd=document.createElement("div"); qd.className="question"; qd.innerHTML="<div class='q-text'>"+q+"</div>";
    const opts=document.createElement("div"); opts.className="opts";
    [1,2,3].forEach(n=>{
      const o=document.createElement("div"); o.className="opt"+(answers[key]===n?" sel":""); o.innerHTML="<div>"+n+"</div><div>"+["Not in place","Partially in place","Fully in place"][n-1]+"</div>";
      o.onclick=()=>{answers[key]=n; opts.querySelectorAll(".opt").forEach(x=>x.classList.remove("sel")); o.classList.add("sel"); updateProgress();};
      opts.appendChild(o);
    });
    qd.appendChild(opts); wrap.appendChild(qd);
  });
  const nav=document.createElement("div"); nav.className="nav";
  const back=document.createElement("button"); back.className="btn secondary"; back.innerHTML="← Back"; back.style.visibility=cur===0?"hidden":"visible"; back.onclick=()=>{cur--; renderSection();};
  const next=document.createElement("button"); next.className="btn primary"; next.innerHTML=cur===sections.length-1?"Continue →":"Next →"; next.onclick=()=>{if(cur<sections.length-1){cur++;renderSection();}else{renderEmail();show("email");}};
  nav.appendChild(back); nav.appendChild(next); wrap.appendChild(nav);
  updateProgress();
}

function renderEmail(){
  const wrap=el("email"); wrap.innerHTML="";
  const card=document.createElement("div"); card.className="card";
  card.innerHTML="<div class='intro-title' style='margin-bottom:8px'>Your results are ready.</div><div class='intro-body' style='margin-bottom:18px'>Enter your details to see your maturity stage and a personalized action plan based on your specific answers.</div><div class='field'><label>Full Name</label><input type='text' id='f-name' placeholder='Jane Doe'></div><div class='field'><label>Work email</label><input type='email' id='f-email' placeholder='jane@fund.com'></div><div class='field'><label>Firm</label><input type='text' id='f-firm' placeholder='Acme Capital'></div><div class='privacy'>Brio will use this to send your results and occasional relevant content. No spam.</div>";
  const nav=document.createElement("div"); nav.className="nav";
  const back=document.createElement("button"); back.className="btn secondary"; back.innerHTML="← Back"; back.onclick=()=>{cur=sections.length-1;renderSection();show("questions");};
  const sub=document.createElement("button"); sub.className="btn primary"; sub.innerHTML="See my results →"; sub.onclick=submitForm;
  nav.appendChild(back); nav.appendChild(sub); wrap.appendChild(card); wrap.appendChild(nav);
}

function submitForm(){
  const emailEl=el("f-email"), email=emailEl?emailEl.value.trim():"";
  if(!email||email.indexOf("@")===-1){if(emailEl){emailEl.classList.add("err"); emailEl.focus();} return;}
  emailEl.classList.remove("err"); 
  fetch(APP_SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({answers, name:el("f-name").value, email:email, firm:el("f-firm").value})
  });
  renderResults(); show("results"); setProgress(100);
}

function renderResults(){
  const total=Object.values(answers).reduce((a,b)=>a+b,0);
  const stage={name:"Maturity Stage", title:"Your result", body:"You completed the scorecard.", fallback:"Keep building your SPV infrastructure."};
  const wrap=el("results"); wrap.innerHTML="";
  const card=document.createElement("div"); card.className="card";
  const hero=document.createElement("div"); hero.className="score-hero"; hero.innerHTML="<div class='score-big'>"+total+"</div><div class='score-lbl'>Your total score</div><div class='badge'>"+stage.name+"</div>";
  card.appendChild(hero);
  card.appendChild(document.createElement("div")).innerHTML=stage.title+"<br>"+stage.body;
  wrap.appendChild(card);
}

renderIntro();
</script>
</body>
</html>
