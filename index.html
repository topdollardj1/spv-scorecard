<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPV Scorecard</title>

<style>
body{font-family:Arial;background:#e8e6df;padding:30px}
#root{max-width:700px;margin:auto;background:#F1EFE8;padding:30px;border-radius:10px}
.card{background:#fff;padding:20px;border-radius:10px;margin-bottom:20px}
button{padding:10px 20px;cursor:pointer}
.opt{border:1px solid #ccc;padding:10px;margin:5px;cursor:pointer}
.opt.sel{background:#111;color:#fff}
.hidden{display:none}
</style>
</head>

<body>
<div id="root">
<div id="app"></div>
</div>

<script>
const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby-5A4AqR5iCKV9lAxWEudNqUr-hiiXYnxPmI8fFcxbcKAZAckqWFzMQk1ul_3zYzGNTA/exec";

const questions = [
"Launch readiness is strong",
"Investor data is centralized",
"Tracking is accurate",
"LP communication is proactive",
"Operations scale well",
"Economics are sustainable"
];

let answers = {};
let step = 0;

function renderIntro(){
document.getElementById("app").innerHTML = `
<div class="card">
<h2>Rate your SPV infrastructure</h2>
<p>Quick 2-minute scorecard</p>
<button onclick="renderQuestions()">Start</button>
</div>`;
}

function renderQuestions(){
let html = `<div class="card"><h3>Questions</h3>`;
questions.forEach((q,i)=>{
html+=`<p>${q}</p>
<div>
<span class="opt" onclick="select(${i},1,this)">1</span>
<span class="opt" onclick="select(${i},2,this)">2</span>
<span class="opt" onclick="select(${i},3,this)">3</span>
</div>`;
});
html+=`<button onclick="renderForm()">Next</button></div>`;
document.getElementById("app").innerHTML = html;
}

function select(i,val,el){
answers[i]=val;
[...el.parentNode.children].forEach(x=>x.classList.remove("sel"));
el.classList.add("sel");
}

function renderForm(){
document.getElementById("app").innerHTML = `
<div class="card">
<h3>Your details</h3>
<input id="name" placeholder="Full Name"><br><br>
<input id="email" placeholder="Email"><br><br>
<input id="firm" placeholder="Firm"><br><br>
<button onclick="submit()">See results</button>
</div>`;
}

function submit(){
let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let firm=document.getElementById("firm").value;

let score = Object.values(answers).reduce((a,b)=>a+b,0);

fetch(APP_SCRIPT_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify({name,email,firm,score,answers})
});

renderResults(score);
}

function renderResults(score){
let result="";

if(score<=10){
result="<h2>Stage 1</h2><p>You are early stage.</p>";
}
else if(score<=14){
result="<h2>Stage 2</h2><p>You are growing.</p>";
}
else{
result="<h2>Stage 3</h2><p>You are advanced.</p>";
}

document.getElementById("app").innerHTML = `
<div class="card">
<h2>Your Score: ${score}</h2>
${result}
</div>`;
}

renderIntro();
</script>
</body>
</html>
